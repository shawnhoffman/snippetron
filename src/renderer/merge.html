<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fill in Fields</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1f;
    --surface: #22222a;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #5a5a70;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--accent); }

  .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
</style>
</head>
<body>
<h2>Fill in Fields</h2>
<div class="subtitle" id="snippet-name"></div>
<div id="fields"></div>
<div class="actions">
  <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
  <button class="btn btn-primary" id="insert-btn">Insert ↵</button>
</div>

<script>
const { ipcRenderer } = require('electron');

let snippet = null;
let fields = [];

ipcRenderer.on('init', (_, data) => {
  snippet = data.snippet;
  fields = data.fields;

  document.getElementById('snippet-name').textContent = snippet.name;

  const container = document.getElementById('fields');
  container.innerHTML = fields.map((f, i) => `
    <div class="field">
      <label>${f}</label>
      <input type="text" id="field-${i}" data-field="${f}" placeholder="Enter ${f}…">
    </div>
  `).join('');

  // Focus first field
  const first = container.querySelector('input');
  if (first) first.focus();
});

function submit() {
  const values = {};
  fields.forEach((f, i) => {
    values[f] = document.getElementById(`field-${i}`).value;
  });
  ipcRenderer.invoke('merge-submit', { snippet, values });
}

document.getElementById('insert-btn').addEventListener('click', submit);
document.getElementById('cancel-btn').addEventListener('click', () => ipcRenderer.invoke('merge-cancel'));

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submit();
  if (e.key === 'Escape') ipcRenderer.invoke('merge-cancel');
});
</script>
</body>
</html>
