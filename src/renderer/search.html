<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snippetron Search</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1f;
    --surface: #22222a;
    --surface2: #2a2a35;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #5a5a70;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  #search-bar {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  #search-icon {
    color: var(--text3);
    font-size: 16px;
    flex-shrink: 0;
  }

  #search {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
  }

  #search::placeholder { color: var(--text3); }

  #kbd-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface);
    padding: 3px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  #results {
    overflow-y: auto;
    max-height: calc(100vh - 60px);
    padding: 6px;
  }

  #results::-webkit-scrollbar { width: 4px; }
  #results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .result-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.08s;
    gap: 12px;
    border: 1px solid transparent;
  }

  .result-item:hover, .result-item.selected {
    background: var(--surface2);
    border-color: var(--accent);
  }

  .result-item .shortcut {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    min-width: 110px;
    flex-shrink: 0;
  }

  .result-item .name {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-item .preview {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .result-item .paste-hint {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .result-item:hover .paste-hint, .result-item.selected .paste-hint {
    opacity: 1;
  }

  #empty {
    padding: 32px;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
  }
</style>
</head>
<body>
<div id="search-bar">
  <span id="search-icon">⌕</span>
  <input id="search" type="text" placeholder="Search snippets…" autofocus>
  <span id="kbd-hint">↵ paste</span>
</div>
<div id="results"></div>

<script>
const { ipcRenderer } = require('electron');

let snippets = [];
let prefs = {};
let selectedIdx = 0;
let filtered = [];

async function init() {
  snippets = await ipcRenderer.invoke('get-snippets');
  prefs = await ipcRenderer.invoke('get-prefs');
  render('');
}

ipcRenderer.on('snippets-updated', (_, updated) => {
  snippets = updated;
  render(document.getElementById('search').value);
});

function render(q) {
  const lower = q.toLowerCase();
  filtered = q
    ? snippets.filter(s =>
        s.name.toLowerCase().includes(lower) ||
        s.shortcut.toLowerCase().includes(lower) ||
        stripHtml(s.html).toLowerCase().includes(lower)
      )
    : snippets;

  selectedIdx = Math.min(selectedIdx, Math.max(0, filtered.length - 1));

  const container = document.getElementById('results');

  if (filtered.length === 0) {
    container.innerHTML = `<div id="empty">No snippets found</div>`;
    return;
  }

  const trigger = prefs.trigger || '::';

  container.innerHTML = filtered.map((s, i) => `
    <div class="result-item${i === selectedIdx ? ' selected' : ''}" data-idx="${i}">
      <span class="shortcut">${esc(trigger)}${esc(s.shortcut)}</span>
      <span class="name">${esc(s.name)}</span>
      <span class="preview">${esc(stripHtml(s.html).slice(0, 50))}</span>
      <span class="paste-hint">↵</span>
    </div>
  `).join('');

  container.querySelectorAll('.result-item').forEach(el => {
    el.addEventListener('click', () => paste(parseInt(el.dataset.idx)));
    el.addEventListener('dblclick', () => paste(parseInt(el.dataset.idx)));
  });
}

function paste(idx) {
  const s = filtered[idx];
  if (!s) return;
  ipcRenderer.invoke('paste-snippet', s.html);
}

function stripHtml(html) {
  return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('search').addEventListener('input', e => {
  selectedIdx = 0;
  render(e.target.value);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { window.close(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, filtered.length - 1); render(document.getElementById('search').value); return; }
  if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); render(document.getElementById('search').value); return; }
  if (e.key === 'Enter') { paste(selectedIdx); return; }
});

init();
</script>
</body>
</html>
